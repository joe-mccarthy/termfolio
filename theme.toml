# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemes#themetoml for an example

name = "termfolio"
license = "MIT"
licenselink = "https://github.com/joe-mccarthy/termfolio/blob/main/LICENSE"
description = "Terminal-inspired Hugo theme for blogs and portfolios with bundled JetBrains Mono, no tracking, and no runtime external dependencies"
homepage = "https://github.com/joe-mccarthy/termfolio"
tags = ["blog", "portfolio", "terminal", "monospace", "projects", "minimal", "responsive", "fast", "no-js", "no-tracking", "privacy", "accessibility", "seo"]
features = ["blog", "projects", "taxonomies", "dark mode", "post navigation", "table of contents", "shortcodes", "json-ld", "open graph", "pagefind search"]
min_version = "0.128.0"

[author]
  name = "Joe McCarthy"
  homepage = "https://joe-mccarthy.github.io"

[module]
  [module.hugoVersion]
    extended = false
    max = ""
    min = "0.128.0"
