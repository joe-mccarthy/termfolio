# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemesSiteBuilder for current theme gallery metadata.

name = "termfolio"
license = "MIT"
licenselink = "https://github.com/joe-mccarthy/termfolio/blob/main/LICENSE"
description = "Dark terminal-inspired Hugo theme for technical blogs, project portfolios, and repo-style personal sites with no tracking and no JavaScript by default"
homepage = "https://github.com/joe-mccarthy/termfolio"
demosite = "https://joe-mccarthy.github.io/termfolio/"
tags = ["blog", "portfolio", "terminal", "monospace", "projects", "personal-site", "technical-writing", "minimal", "fast", "no-js", "no-tracking", "privacy", "accessibility", "seo"]
features = ["blog", "projects", "taxonomies", "dark-only", "post navigation", "table of contents", "shortcodes", "json-ld", "open graph", "static search", "pagefind search"]
min_version = "0.128.0"

[author]
  name = "Joe McCarthy"
  homepage = "https://joe-mccarthy.github.io"

[module]
  [module.hugoVersion]
    extended = false
    max = ""
    min = "0.128.0"
