name: Feature request
description: Suggest an improvement for Termfolio.
title: "feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow, content type, or user need should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, config, layout, or documentation change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or other approaches if you have tried them.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits Termfolio's static, privacy-first, no-JavaScript-by-default direction.
          required: true
        - label: I can help test the change with a Hugo site or example content.
          required: false
