name: Showcase site
description: Share a public site using Termfolio.
title: "showcase: "
labels:
  - showcase
body:
  - type: input
    id: site-url
    attributes:
      label: Site URL
      placeholder: "https://example.org"
    validations:
      required: true
  - type: input
    id: source-url
    attributes:
      label: Source URL
      description: Optional public repository or source page.
      placeholder: "https://github.com/user/site"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What kind of site is it, and how are you using Termfolio?
    validations:
      required: true
  - type: checkboxes
    id: permission
    attributes:
      label: Permission
      options:
        - label: Termfolio may list this site in the README or documentation.
          required: true
