name: Showcase site
description: Share a public site that uses Termfolio.
title: "showcase: "
body:
  - type: input
    id: site-url
    attributes:
      label: Site URL
      placeholder: "https://example.org"
    validations:
      required: true
  - type: input
    id: source-url
    attributes:
      label: Source URL
      description: Link an optional public repository or source page.
      placeholder: "https://github.com/user/site"
    validations:
      required: false
  - type: input
    id: termfolio-version
    attributes:
      label: Termfolio version
      description: Provide the release tag or commit used by the site.
      placeholder: "v1.0.0"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What kind of site is it, and how are you using Termfolio?
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Optionally attach a representative screenshot.
    validations:
      required: false
  - type: checkboxes
    id: permission
    attributes:
      label: Permission
      options:
        - label: I am authorised to submit this site and Termfolio may link to it from project documentation.
          required: true
