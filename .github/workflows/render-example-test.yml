name: Hugo Smoke Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: hugo-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-example:
    name: Hugo ${{ matrix.hugo-version }} (standard)
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        hugo-version:
          - "0.128.0"
          - "0.164.0"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: ${{ matrix.hugo-version }}
          extended: false

      - name: Verify standard Hugo installation
        env:
          EXPECTED_HUGO_VERSION: ${{ matrix.hugo-version }}
        run: |
          version=$(hugo version)
          [[ "$version" == *"v${EXPECTED_HUGO_VERSION}"* ]]
          [[ "$version" != *"+extended"* ]]

      - name: Build and verify example site
        run: bash scripts/test-theme.sh "${{ matrix.hugo-version }}"

  quality:
    name: Documentation and accessibility
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: "0.164.0"
          extended: false

      - name: Install quality tooling
        run: npm ci --ignore-scripts

      - name: Lint Markdown
        run: npm run lint:markdown

      - name: Check documentation links
        run: npm run check:links

      - name: Check shell scripts
        run: shellcheck scripts/*.sh

      - name: Test release candidate validation
        run: bash scripts/test-release-validator.sh

      - name: Audit accessibility
        run: npm run test:accessibility

  required-checks:
    name: Required checks
    if: ${{ always() }}
    needs:
      - build-example
      - quality
    permissions: {}
    runs-on: ubuntu-24.04
    timeout-minutes: 2

    steps:
      - name: Confirm required jobs passed
        env:
          BUILD_RESULT: ${{ needs.build-example.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
        run: |
          test "$BUILD_RESULT" = success
          test "$QUALITY_RESULT" = success
