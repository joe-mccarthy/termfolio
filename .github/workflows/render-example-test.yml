name: Hugo Smoke Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: hugo-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-example:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: '0.128.0'
          extended: true

      - name: Build example site
        working-directory: example-site
        run: |
          hugo \
            --gc \
            --minify \
            --noBuildLock \
            --panicOnWarning \
            --themesDir ../../ \
            --theme termfolio \
            --destination ../.public

      - name: Verify output exists
        run: test -f .public/index.html
