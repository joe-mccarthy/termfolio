name: Create Release

on:
  push:
    tags:
      - 'v*.*.*' # broad match; exact version format is validated below

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Validate tag format
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "Invalid release tag: $TAG"
            echo "Expected one of:"
            echo "  v1.2.3"
            echo "  v1.2.3-rc.1"
            exit 1
          fi

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          args=(
            "$TAG"
            --repo "$GITHUB_REPOSITORY"
            --title "${TAG#v}"
            --generate-notes
          )

          if [[ "$TAG" =~ -rc\.[0-9]+$ ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
