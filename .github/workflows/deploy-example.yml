name: Deploy Theme Example

on:
  workflow_run:
    workflows:
      - Hugo Smoke Test
    types:
      - completed
    branches:
      - main

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pages: read
    env:
      HUGO_VERSION: "0.164.0"

    steps:
      - name: Checkout exact validated commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify checked-out commit
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: false

      - name: Verify standard Hugo installation
        run: |
          version=$(hugo version)
          [[ "$version" == *"v${HUGO_VERSION}"* ]]
          [[ "$version" != *"+extended"* ]]

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Europe/London
        run: |
          cd example-site
          hugo \
            --cleanDestinationDir \
            --gc \
            --minify \
            --noBuildLock \
            --panicOnWarning \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --source . \
            --themesDir ../../ \
            --theme termfolio \
            --destination ../.public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: .public

  deploy:
    if: ${{ needs.build.result == 'success' }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
