<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default .Site.Language.Lang | default "en" }}">
  <head>
    <title>{{ partial "page-title.html" . }}</title>
    {{ partial "head.html" . }}
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>
    <div id="root">
      {{ partial "header.html" . }}
      <div id="content">
        {{ block "main" . }}{{ end }}
      </div>
      {{ partial "footer.html" . }}
    </div>
  </body>
</html>
